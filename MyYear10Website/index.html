<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- Added favicon (use the attached image saved as images/favicon.png) -->
    <link rel="icon" href="images/Star 1.png" type="image/png">
    <title>Baxter's Showcase websiste</title>

    <!-- Added: hero background image instead of green-to-yellow gradient -->
    <style>
        @font-face {
            font-family: 'Jersy 25';
            src: url('fonts/Jersy25.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* Apply Jersy 25 to all text */
        body {
            font-family: 'Jersy 25', Arial, sans-serif;
        }

        .hero {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* changed code: use a background image instead of a gradient */
            background-image: url('images/frame 13 (1).png');
            background-size: cover;
            background-position: center;
            color: #ffffff;
        }

        .hero-text {
            font-size: 2rem;
            font-weight: 700;
            padding: 1rem 2rem;
            text-align: center;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            font-family: 'Jersy 25', Arial, sans-serif;
        }
    </style>
</head>
<!-- This is the main body of the website- ALL your content goes AFTER the <body> tag and before the </body> tag -->
<body>

    <!-- The Hero Section -------------------------------------------------------------------------------------- -->
    <section class="hero">
        <div class="hero-text" style="font-size:3rem;">Baxter's Showcase Website</div>
    </section>

<!-- Topic one ------------------------------------------------------------------------------------------------- -->
    <!-- The First Topic Section -->
    <section class="topic">
        <!-- the topic title a big bar with text in it -->
        <div class="topic-title">
            <h2>Image Editing</h2>
        </div>
        <!-- now a three column grid of images -->
        <div class="topic-content">
            <!-- one "card" which includes an image with a text below it -->
            <div class="topic-card">
                <img src="images/Frame 9.png" alt="change this too!">
                <h2 class="topic-card-text">Character Design</h2>
            </div>
            <div class="topic-card">
                <img src="images/Frame 10.png" alt="change this too!">
                <h2 class="topic-card-text">Snow Flake</h2>
            </div>
            <div class="topic-card">
                <img src="images/Frame 11.png" alt="change this too!">
                <h2 class="topic-card-text">Background</h2>
            </div>
        </div>
    </section>
<!-- End of topic one------------------------------------------------------------------------------------------ -->

<!-- Copy and paste the section from above to make your next section -->



    <!-- A Simple Website Footer ------------------------------------------------------------------------------ -->
    <footer class="footer">
        <p>&copy; 2026 Baxter Douglas</p>
    </footer>

<!-- The end of the whole page- no more content after this! -->
</body>
</html>
